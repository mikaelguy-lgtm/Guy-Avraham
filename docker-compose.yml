services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: syncash
      POSTGRES_USER: syncash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncash -d syncash"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [backend]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [backend]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [backend, frontend]

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [backend, frontend]

  firebase-auth:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["sh", "-lc", "npx firebase emulators:start --only auth --project syncash-local 2>&1 | sed -E 's#https?://[^[:space:]]*oobCode[^[:space:]]*#[verification-link-redacted]#g'"]
    environment:
      FIREBASE_CLI_EXPERIMENTS: webframeworks
    ports:
      - "9099:9099"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9099/emulator/v1/projects/syncash-local/config >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [backend, frontend]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - local_secrets:/var/lib/syncash-secrets
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio: {condition: service_healthy}
      mailpit: {condition: service_healthy}
      firebase-auth: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [backend, frontend]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
      VITE_FIREBASE_AUTH_EMULATOR_URL: ${VITE_FIREBASE_AUTH_EMULATOR_URL}
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5173/ >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [frontend]

networks:
  backend:
    internal: true
  frontend:

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_node_modules:
  frontend_node_modules:
  local_secrets:
